# Nginx 伪静态规则（让 URL 不带 .html 后缀）
#
# 作用：把 /report 映射到 /report.html、/index 映射到 /index.html，
#       这样分享链接长这样：https://你的域名/check/report?id=xxxx（干净、专业），
#       而不是 https://你的域名/check/report.html?id=xxxx。
#
# 用法（宝塔面板）：
#   宝塔 →【网站】→ 你的站点 →【设置】→【伪静态】→ 把下面整段粘进去 → 保存。
#   （宝塔的伪静态框就是 Nginx 的 location 配置片段，直接粘贴即可。）
#
# 用法（原生 Nginx）：把下面的 location 段并入站点 server{} 块，reload nginx。
#
# 说明：
#   - 带后缀的原始文件（report.html / index.html）依然能正常访问，不受影响；
#     本规则只是额外允许「无后缀」也能访问。
#   - api/ 下的 PHP 接口、assets/ 静态资源、data/ 不受影响（仅对无后缀且非真实文件的请求补 .html）。

location / {
    # 1) 真实存在的文件/目录直接返回（assets、api/*.php、data 等都走这里）
    # 2) 否则尝试加 .html 后缀（让 /report → /report.html、/index → /index.html）
    # 3) 再不行返回 404
    try_files $uri $uri/ $uri.html =404;
}

# PHP 接口照常交给 PHP 处理（宝塔通常已自带，如已存在可不重复添加）
location ~ \.php$ {
    include enable-php.conf;
}
